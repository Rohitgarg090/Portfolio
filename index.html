// SVG Bar Chart
function svgBarChart(data){
  var pL=38,pB=48,pT=22,pR=12,W=480,H=185;
  var gW=W-pL-pR,gH=H-pB-pT;
  var maxV=0;data.forEach(function(d){if(d.val>maxV)maxV=d.val;});maxV=Math.ceil(maxV/10)*10||60;
  var n=data.length,bW=(gW/n)*0.52,gap=gW/n;
  var s='<svg class="chart-svg" viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg">';
  // grid
  [0,Math.round(maxV/4),Math.round(maxV/2),Math.round(maxV*3/4),maxV].forEach(function(v){
    var y=pT+gH-(v/maxV)*gH;
    s+='<line x1="'+pL+'" y1="'+y+'" x2="'+(W-pR)+'" y2="'+y+'" stroke="rgba(255,255,255,.06)" stroke-width="1"/>';
    s+='<text x="'+(pL-5)+'" y="'+(y+4)+'" text-anchor="end" fill="#6b6b8a" font-size="10">'+v+'</text>';
  });
  // axes
  s+='<line x1="'+pL+'" y1="'+pT+'" x2="'+pL+'" y2="'+(pT+gH)+'" stroke="rgba(255,255,255,.1)" stroke-width="1"/>';
  s+='<line x1="'+pL+'" y1="'+(pT+gH)+'" x2="'+(W-pR)+'" y2="'+(pT+gH)+'" stroke="rgba(255,255,255,.1)" stroke-width="1"/>';
  // y label
  s+='<text x="10" y="'+(pT+gH/2)+'" text-anchor="middle" fill="#6b6b8a" font-size="9" transform="rotate(-90,10,'+(pT+gH/2)+')">Story Points</text>';
  data.forEach(function(d,i){
    var x=pL+i*gap+(gap-bW)/2;
    var bH=Math.max(2,(d.val/maxV)*gH);
    var y=pT+gH-bH;
    s+='<rect x="'+x+'" y="'+y+'" width="'+bW+'" height="'+bH+'" rx="3" fill="'+d.c+'" opacity="0.88"/>';
    s+='<rect x="'+x+'" y="'+y+'" width="'+bW+'" height="6" rx="3" fill="rgba(255,255,255,.18)"/>';
    s+='<text x="'+(x+bW/2)+'" y="'+(y-5)+'" text-anchor="middle" fill="'+d.c+'" font-size="10" font-weight="600">'+d.val+'</text>';
    s+='<text x="'+(x+bW/2)+'" y="'+(pT+gH+14)+'" text-anchor="middle" fill="#9999b8" font-size="10">'+esc(d.lbl)+'</text>';
    if(d.sub)s+='<text x="'+(x+bW/2)+'" y="'+(pT+gH+26)+'" text-anchor="middle" fill="#6b6b8a" font-size="9">'+esc(d.sub)+'</text>';
  });
  return s+'</svg>';
}

// SVG Donut
function svgDonut(data){
  var W=420,H=185,cx=130,cy=90,oR=72,iR=40;
  var total=0;data.forEach(function(d){total+=d.val;});
  var sa=-Math.PI/2;
  var s='<svg class="chart-svg" viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg">';
  data.forEach(function(d){
    var sl=(d.val/total)*Math.PI*2,ea=sa+sl;
    var x1=cx+Math.cos(sa)*oR,y1=cy+Math.sin(sa)*oR;
    var x2=cx+Math.cos(ea)*oR,y2=cy+Math.sin(ea)*oR;
    var xi1=cx+Math.cos(ea)*iR,yi1=cy+Math.sin(ea)*iR;
    var xi2=cx+Math.cos(sa)*iR,yi2=cy+Math.sin(sa)*iR;
    var lf=sl>Math.PI?1:0;
    var path='M '+x1+' '+y1+' A '+oR+' '+oR+' 0 '+lf+' 1 '+x2+' '+y2+' L '+xi1+' '+yi1+' A '+iR+' '+iR+' 0 '+lf+' 0 '+xi2+' '+yi2+' Z';
    s+='<path d="'+path+'" fill="'+d.c+'" opacity="0.88"/>';
    sa=ea;
  });
  s+='<circle cx="'+cx+'" cy="'+cy+'" r="'+(iR-1)+'" fill="#16161f"/>';
  s+='<text x="'+cx+'" y="'+(cy-6)+'" text-anchor="middle" fill="#e2e2f0" font-size="12" font-weight="600">Hybrid</text>';
  s+='<text x="'+cx+'" y="'+(cy+10)+'" text-anchor="middle" fill="#6b6b8a" font-size="10">PM + Tech</text>';
  var lx=222,ly=cy-data.length*16;
  data.forEach(function(d,i){
    var y=ly+i*30;
    s+='<rect x="'+lx+'" y="'+y+'" width="9" height="9" rx="2" fill="'+d.c+'"/>';
    s+='<text x="'+(lx+14)+'" y="'+(y+9)+'" fill="#9999b8" font-size="11">'+esc(d.lbl)+'</text>';
    s+='<text x="'+(lx+14)+'" y="'+(y+20)+'" fill="#6b6b8a" font-size="10">'+d.val+'%</text>';
  });
  return s+'</svg>';
}

// SVG Burn-up
function svgBurnUp(plan,actual){
  var pL=38,pB=32,pT=18,pR=14,W=480,H=185;
  var gW=W-pL-pR,gH=H-pB-pT,n=plan.length;
  function px(i){return pL+(i/(n-1))*gW;}
  function py(v){return pT+gH-(v/100)*gH;}
  var s='<svg class="chart-svg" viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg">';
  [0,25,50,75,100].forEach(function(v){
    var y=py(v);
    s+='<line x1="'+pL+'" y1="'+y+'" x2="'+(W-pR)+'" y2="'+y+'" stroke="rgba(255,255,255,.05)" stroke-width="1"/>';
    s+='<text x="'+(pL-5)+'" y="'+(y+4)+'" text-anchor="end" fill="#6b6b8a" font-size="9">'+v+'%</text>';
  });
  s+='<line x1="'+pL+'" y1="'+pT+'" x2="'+pL+'" y2="'+(pT+gH)+'" stroke="rgba(255,255,255,.1)" stroke-width="1"/>';
  s+='<line x1="'+pL+'" y1="'+(pT+gH)+'" x2="'+(W-pR)+'" y2="'+(pT+gH)+'" stroke="rgba(255,255,255,.1)" stroke-width="1"/>';
  // area fill
  var aPath='M '+px(0)+' '+(pT+gH);
  actual.forEach(function(v,i){aPath+=' L '+px(i)+' '+py(v);});
  aPath+=' L '+px(actual.length-1)+' '+(pT+gH)+' Z';
  s+='<path d="'+aPath+'" fill="#7c6ff7" opacity="0.08"/>';
  // planned dashed
  var pPts=plan.map(function(v,i){return px(i)+','+py(v);}).join(' ');
  s+='<polyline points="'+pPts+'" fill="none" stroke="#3d3d5c" stroke-width="2" stroke-dasharray="5,3"/>';
  // actual line
  var aPts=actual.map(function(v,i){return px(i)+','+py(v);}).join(' ');
  s+='<polyline points="'+aPts+'" fill="none" stroke="#7c6ff7" stroke-width="2.5"/>';
  actual.forEach(function(v,i){s+='<circle cx="'+px(i)+'" cy="'+py(v)+'" r="3.5" fill="#7c6ff7"/>';});
  // legend
  s+='<line x1="'+pL+'" y1="'+(H-9)+'" x2="'+(pL+20)+'" y2="'+(H-9)+'" stroke="#3d3d5c" stroke-width="2" stroke-dasharray="4,3"/>';
  s+='<text x="'+(pL+24)+'" y="'+(H-5)+'" fill="#6b6b8a" font-size="9">Planned trajectory</text>';
  s+='<line x1="'+(pL+140)+'" y1="'+(H-9)+'" x2="'+(pL+160)+'" y2="'+(H-9)+'" stroke="#7c6ff7" stroke-width="2"/>';
  s+='<text x="'+(pL+164)+'" y="'+(H-5)+'" fill="#7c6ff7" font-size="9">Actual (ahead)</text>';
  return s+'</svg>';
}

}
