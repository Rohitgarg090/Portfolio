<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Rohit Garg | PM Portfolio</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
#c{display:block;position:fixed;top:0;left:0}
#hud{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none}
.panel{position:absolute;right:4%;top:50%;transform:translateY(-50%) translateX(130%);width:min(340px,88vw);background:rgba(5,5,20,.85);backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.13);border-radius:18px;padding:1.6rem;color:#fff;transition:transform .75s cubic-bezier(.34,1.56,.64,1);pointer-events:all;max-height:88vh;overflow-y:auto}
.panel.on{transform:translateY(-50%) translateX(0)}
.ptag{font-size:.68rem;text-transform:uppercase;letter-spacing:.15em;color:#a78bfa;margin-bottom:.4rem}
.ptitle{font-size:1.45rem;font-weight:700;line-height:1.2;margin-bottom:.65rem}
.pbody{font-size:.84rem;color:rgba(255,255,255,.65);line-height:1.75}
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin-top:.85rem}
.pstat{background:rgba(255,255,255,.06);border-radius:10px;padding:.75rem .8rem}
.pnum{font-size:1.45rem;font-weight:700;background:linear-gradient(130deg,#a78bfa,#34d399);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1}
.pnumlbl{font-size:.68rem;color:rgba(255,255,255,.42);margin-top:.2rem;line-height:1.3}
.sbar-row{margin-bottom:.7rem}
.sbar-top{display:flex;justify-content:space-between;font-size:.76rem;margin-bottom:.2rem;color:rgba(255,255,255,.8)}
.sbar-pct{color:#a78bfa}
.sbar{height:4px;background:rgba(255,255,255,.1);border-radius:100px;overflow:hidden}
.sfill{height:100%;border-radius:100px;background:linear-gradient(90deg,#7c6ff7,#0fd4aa);width:0;transition:width 1.1s cubic-bezier(.4,0,.2,1)}
.titem{display:flex;gap:.65rem;margin-bottom:.8rem;align-items:flex-start}
.tdot{width:8px;height:8px;border-radius:50%;background:#a78bfa;margin-top:.35rem;flex-shrink:0}
.trole{font-weight:600;color:#fff;font-size:.84rem}
.tdetail{font-size:.76rem;color:rgba(255,255,255,.5);margin-top:.1rem}
.chip{display:inline-block;background:rgba(167,139,250,.15);border:1px solid rgba(167,139,250,.3);color:#a78bfa;border-radius:100px;padding:.18rem .6rem;font-size:.68rem;margin:.2rem .1rem 0 0}
.chip.g{background:rgba(52,211,153,.12);border-color:rgba(52,211,153,.25);color:#34d399}
.btn-cv{display:inline-block;margin-top:.9rem;background:linear-gradient(130deg,#7c6ff7,#0fd4aa);color:#fff;text-decoration:none;padding:.5rem 1.1rem;border-radius:8px;font-size:.8rem;font-weight:600;pointer-events:all}
.clink{display:flex;align-items:center;gap:.5rem;margin-top:.6rem;font-size:.84rem;text-decoration:none;color:rgba(255,255,255,.72)}
.clink:hover{color:#fff}
#dots{position:fixed;right:1.4rem;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:.6rem;pointer-events:all;z-index:300}
.ndot{width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,.28);cursor:pointer;transition:all .25s;border:none;outline:none;padding:0}
.ndot.on{background:#fff;transform:scale(1.5)}
#bar{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:1.1rem;pointer-events:all;z-index:300}
.nbtn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);color:#fff;border-radius:100px;padding:.5rem 1.2rem;font-size:.82rem;cursor:pointer;transition:all .2s;backdrop-filter:blur(10px)}
.nbtn:hover{background:rgba(255,255,255,.2)}
#slbl{color:rgba(255,255,255,.5);font-size:.76rem;min-width:100px;text-align:center;letter-spacing:.05em}
#spd{position:fixed;top:1.1rem;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.32);font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;pointer-events:none}
#tbar{position:fixed;top:1.1rem;left:2rem;color:rgba(255,255,255,.5);font-size:.76rem;font-weight:500;letter-spacing:.05em}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <div id="dots"></div>
  <div id="bar">
    <button class="nbtn" id="prev">Back</button>
    <div id="slbl">Starting…</div>
    <button class="nbtn" id="next">Next</button>
  </div>
  <div id="spd">Cruising through career milestones</div>
  <div id="tbar">Rohit Garg · PM Portfolio</div>
</div>
<script>
var CV=document.getElementById('c'),ctx=CV.getContext('2d'),W,H;
function rsz(){W=CV.width=window.innerWidth;H=CV.height=window.innerHeight;}
rsz();window.addEventListener('resize',rsz);

var SECTIONS=[
  {id:'hero',   s1:'#0d0221',s2:'#2a0845',gr:'#1a0a2e',rd:'#120818',hz:'#3d1060',sun:'#e879f9',sy:.30,sta:1,mon:1},
  {id:'metrics',s1:'#1a0533',s2:'#c2410c',gr:'#3d2b1f',rd:'#2a1f15',hz:'#ea580c',sun:'#fbbf24',sy:.55,sta:0,mon:0},
  {id:'journey',s1:'#0c4a6e',s2:'#7dd3fc',gr:'#2d5a1b',rd:'#4b5563',hz:'#a8d8a8',sun:'#fef08a',sy:.18,sta:0,mon:0},
  {id:'skills', s1:'#020617',s2:'#0f172a',gr:'#0a0a1e',rd:'#050510',hz:'#1e3a5f',sun:'#60a5fa',sy:.38,sta:1,mon:0},
  {id:'about',  s1:'#7c2d12',s2:'#ea580c',gr:'#2d4a1b',rd:'#2d2010',hz:'#f97316',sun:'#fcd34d',sy:.68,sta:0,mon:0},
  {id:'contact',s1:'#000010',s2:'#0c0c2e',gr:'#080818',rd:'#04040e',hz:'#1a1a4e',sun:'#c4b5fd',sy:.32,sta:1,mon:1}
];

var cur=0,from=0,to=0,tT=1,inTrans=false,scrollX=0,tick=0,SPEED=3.2;
var clouds,mountains,trees,walkers,birds,grass,flowers,starsArr,buildings,particles=[];
var wheelA=0,bobPh=0;

function mkWorld(){
  clouds=[];
  for(var i=0;i<14;i++) clouds.push({x:i*220+Math.random()*100,y:35+Math.random()*90,w:90+Math.random()*130,h:28+Math.random()*38,sp:.3+Math.random()*.45,a:.55+Math.random()*.4,l:i%3});
  mountains=[];
  for(var i=0;i<22;i++) mountains.push({x:i*190-200,w:280+Math.random()*200,hp:.2+Math.random()*.12,l:0});
  for(var i=0;i<18;i++) mountains.push({x:i*200-100,w:240+Math.random()*160,hp:.12+Math.random()*.07,l:1});
  trees=[];
  for(var i=0;i<50;i++) trees.push({x:i*110-200,sc:.55+Math.random()*.85,tp:i%3,l:i%2});
  buildings=[];
  for(var i=0;i<22;i++) buildings.push({x:i*160-200,w:55+Math.random()*85,h:70+Math.random()*220,seed:i*7.3});
  walkers=[];
  for(var i=0;i<7;i++) walkers.push({x:150+i*230,dir:i%2?1:-1,sp:.7+Math.random()*.7,fr:Math.random()*10,sc:.6+Math.random()*.28});
  birds=[];
  for(var i=0;i<10;i++) birds.push({x:Math.random()*3000,y:50+Math.random()*100,sp:1.2+Math.random()*1.4,wn:Math.random()*6.28,sz:3+Math.random()*4});
  grass=[];
  for(var i=0;i<80;i++) grass.push({x:i*75+Math.random()*35,h:5+Math.random()*13,sw:Math.random()*6.28,c:['#86efac','#f9a8d4','#fde68a','#6ee7b7'][i%4]});
  flowers=[];
  for(var i=0;i<30;i++) flowers.push({x:i*160+Math.random()*80,c:['#f472b6','#facc15','#818cf8','#fb923c'][i%4]});
  starsArr=[];
  for(var i=0;i<220;i++) starsArr.push({x:Math.random()*5000,yf:Math.random()*.44,r:.4+Math.random()*1.6,tw:Math.random()*6.28,sp:.04+Math.random()*.08});
}
mkWorld();

function h2r(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}
function lc(a,b,t){var ra=h2r(a),rb=h2r(b);return'rgb('+~~(ra[0]+(rb[0]-ra[0])*t)+','+~~(ra[1]+(rb[1]-ra[1])*t)+','+~~(ra[2]+(rb[2]-ra[2])*t)+')';}
function lerp(a,b,t){return a+(b-a)*t;}
function ease(t){return t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2;}

function getEnv(){
  var p=ease(Math.min(tT,1)),a=SECTIONS[from],b=SECTIONS[to];
  return{
    s1:lc(a.s1,b.s1,p),s2:lc(a.s2,b.s2,p),gr:lc(a.gr,b.gr,p),
    rd:lc(a.rd,b.rd,p),hz:lc(a.hz,b.hz,p),sun:lc(a.sun,b.sun,p),
    sy:lerp(a.sy,b.sy,p),stA:lerp(a.sta,b.sta,p),monA:lerp(a.mon,b.mon,p)
  };
}

function drawSky(e){
  var g=ctx.createLinearGradient(0,0,0,H*.75);
  g.addColorStop(0,e.s1);g.addColorStop(1,e.s2);
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
}

function drawStars(e){
  if(e.stA<.02)return;
  for(var i=0;i<starsArr.length;i++){
    var s=starsArr[i];
    var x=((s.x-scrollX*s.sp)%(W*3)+W*4)%(W*3);
    if(x<0||x>W)continue;
    var tw=Math.sin(tick*2+s.tw)*.4+.6;
    ctx.save();ctx.globalAlpha=tw*e.stA*.9;
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(x,s.yf*H,s.r,0,6.28);ctx.fill();
    ctx.restore();
  }
}

function drawSun(e){
  var sx=W*.74,sy=e.sy*H;
  var g=ctx.createRadialGradient(sx,sy,3,sx,sy,90);
  g.addColorStop(0,e.sun);g.addColorStop(1,'transparent');
  ctx.fillStyle=g;ctx.fillRect(sx-90,sy-90,180,180);
  ctx.fillStyle=e.sun;ctx.beginPath();
  if(e.monA>.5){
    ctx.arc(sx,sy,18,0,6.28);ctx.fill();
    ctx.fillStyle='rgba(0,0,0,.18)';
    var craters=[[6,-5,4],[-9,4,3],[2,9,3]];
    for(var i=0;i<craters.length;i++){
      ctx.beginPath();ctx.arc(sx+craters[i][0],sy+craters[i][1],craters[i][2],0,6.28);ctx.fill();
    }
  } else {
    ctx.arc(sx,sy,28,0,6.28);ctx.fill();
  }
}

function drawMountains(e){
  var fc=lc(e.s2,e.gr,.42);
  for(var i=0;i<mountains.length;i++){
    var m=mountains[i];
    if(m.l!==0)continue;
    var x=((m.x-scrollX*.07)%(W*4)+W*6)%(W*4)-W*.5;
    if(x<-400||x>W+200)continue;
    var bY=H*.71,pH=H*m.hp;
    ctx.fillStyle=fc;ctx.beginPath();ctx.moveTo(x,bY);
    for(var j=0;j<=7;j++){
      var px=x+m.w/7*j;
      var ph=j===3?pH:pH*(.3+Math.abs(Math.sin(m.x*.1+j*2.3))*.35);
      ctx.lineTo(px,bY-ph);
    }
    ctx.closePath();ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.5)';ctx.beginPath();
    ctx.moveTo(x+m.w*.36,bY-pH*.62);ctx.lineTo(x+m.w*.5,bY-pH);ctx.lineTo(x+m.w*.64,bY-pH*.62);ctx.closePath();ctx.fill();
  }
  var mc=lc(e.hz,e.gr,.55);
  for(var i=0;i<mountains.length;i++){
    var m=mountains[i];
    if(m.l!==1)continue;
    var x=((m.x-scrollX*.18)%(W*4)+W*6)%(W*4)-W*.3;
    if(x<-300||x>W+200)continue;
    var bY=H*.775,pH=H*m.hp;
    ctx.fillStyle=mc;ctx.beginPath();ctx.moveTo(x,bY);
    ctx.bezierCurveTo(x+m.w*.25,bY-pH*1.2,x+m.w*.75,bY-pH*1.2,x+m.w,bY);
    ctx.closePath();ctx.fill();
  }
}

function drawBuildings(e){
  var isCity=(SECTIONS[cur].id==='skills');
  var p=ease(Math.min(tT,1));
  var alpha=isCity?1:0;
  if(inTrans){
    if(SECTIONS[to].id==='skills') alpha=p;
    else if(SECTIONS[from].id==='skills') alpha=1-p;
  }
  if(alpha<.02)return;
  var bY=H*.82;
  ctx.save();ctx.globalAlpha=alpha;
  for(var i=0;i<buildings.length;i++){
    var b=buildings[i];
    var x=((b.x-scrollX*.65)%(W*4)+W*6)%(W*4)-150;
    if(x<-200||x>W+100)continue;
    ctx.fillStyle='#0f0f2a';
    ctx.fillRect(x,bY-b.h,b.w,b.h);
    ctx.strokeStyle='rgba(80,80,160,.35)';ctx.lineWidth=1;
    ctx.strokeRect(x,bY-b.h,b.w,b.h);
    var cols=Math.floor(b.w/22),rows=Math.floor(b.h/22);
    for(var r=1;r<=rows;r++){
      for(var cc=0;cc<cols;cc++){
        var lit=Math.sin(b.seed+r*3.1+cc*7.7+tick*.4)>.05;
        if(lit){
          ctx.fillStyle=Math.sin(b.seed+r+cc)>.1?'#fef08a':'#93c5fd';
          ctx.fillRect(x+cc*22+5,bY-b.h+r*22-14,13,10);
        }
      }
    }
  }
  ctx.restore();
}

function drawTrees(e){
  for(var i=0;i<trees.length;i++){
    var tr=trees[i];
    var sp=tr.l===0?.45:.82;
    var x=((tr.x-scrollX*sp)%(W*4)+W*6)%(W*4)-80;
    if(x<-100||x>W+100)continue;
    var gY=H*(tr.l===0?.764:.802),sc=tr.sc;
    var tH=32*sc,tW=7*sc,cH=55*sc;
    ctx.fillStyle='#5c3317';ctx.fillRect(x-tW/2,gY-tH,tW,tH);
    if(tr.tp===0){
      ctx.fillStyle='#166534';
      var layers=[[0,-cH,.58*cH],[0,-.65*cH,.72*cH],[0,-.3*cH,.88*cH]];
      for(var j=0;j<layers.length;j++){
        var py=gY-tH+(-layers[j][1]);
        ctx.beginPath();ctx.moveTo(x-layers[j][2],py);ctx.lineTo(x,py+layers[j][1]);ctx.lineTo(x+layers[j][2],py);ctx.closePath();ctx.fill();
      }
    } else if(tr.tp===1){
      ctx.fillStyle='#15803d';ctx.beginPath();ctx.arc(x,gY-tH-cH*.5,cH*.58,0,6.28);ctx.fill();
      ctx.fillStyle='#166534';ctx.beginPath();ctx.arc(x-8*sc,gY-tH-cH*.35,cH*.38,0,6.28);ctx.fill();
    } else {
      ctx.fillStyle='#16a34a';
      for(var j=0;j<3;j++){ctx.beginPath();ctx.arc(x+(j-1)*14*sc,gY-tH-18*sc-j*14*sc,(22-j*4)*sc,0,6.28);ctx.fill();}
    }
  }
}

function drawGrass(){
  var gY=H*.82;
  for(var i=0;i<grass.length;i++){
    var g=grass[i];
    var x=((g.x-scrollX*.96)%(W*2.5)+W*4)%(W*2.5);
    if(x<0||x>W)continue;
    var sw=Math.sin(tick*2+g.sw)*2.5;
    ctx.strokeStyle=g.c;ctx.lineWidth=1.5;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(x,gY);ctx.quadraticCurveTo(x+sw,gY-g.h*.6,x+sw*1.6,gY-g.h);ctx.stroke();
  }
  for(var i=0;i<flowers.length;i++){
    var f=flowers[i];
    var x=((f.x-scrollX*.96)%(W*3)+W*4)%(W*3);
    if(x<0||x>W)continue;
    ctx.fillStyle=f.c;ctx.beginPath();ctx.arc(x,gY-3,3.5,0,6.28);ctx.fill();
  }
}

function drawGround(e){
  var gY=H*.78;
  var gg=ctx.createLinearGradient(0,gY,0,H);
  gg.addColorStop(0,e.gr);gg.addColorStop(1,'#000');
  ctx.fillStyle=gg;ctx.fillRect(0,gY,W,H-gY);
  ctx.strokeStyle='rgba(255,255,255,.07)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(0,gY);ctx.lineTo(W,gY);ctx.stroke();
  var rY=H*.825;
  var rg=ctx.createLinearGradient(0,rY,0,H);
  rg.addColorStop(0,e.rd);rg.addColorStop(1,'#000');
  ctx.fillStyle=rg;ctx.fillRect(0,rY,W,H-rY);
  ctx.strokeStyle='rgba(255,255,255,.12)';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(0,rY);ctx.lineTo(W,rY);ctx.stroke();
}

function drawDashes(){
  var dY=H*.91,dW=58,gap=115;
  ctx.fillStyle='rgba(255,255,255,.32)';
  for(var i=-2;i<W/gap+3;i++){
    var x=((i*gap-scrollX*1.55)%(W+gap*3)+W+gap*3)%(W+gap*3)-gap;
    ctx.fillRect(x,dY-3,dW,5);
  }
}

function drawClouds(){
  for(var i=0;i<clouds.length;i++){
    var c=clouds[i];
    var x=((c.x-scrollX*(.12+c.l*.06))%(W*3)+W*4)%(W*3)-W*.3;
    if(x<-250||x>W+250)continue;
    ctx.save();ctx.globalAlpha=c.a*.85;ctx.fillStyle='#fff';
    ctx.beginPath();
    ctx.ellipse(x,c.y,c.w*.5,c.h*.45,0,0,6.28);
    ctx.ellipse(x-c.w*.23,c.y+c.h*.18,c.w*.28,c.h*.34,0,0,6.28);
    ctx.ellipse(x+c.w*.24,c.y+c.h*.18,c.w*.26,c.h*.30,0,0,6.28);
    ctx.ellipse(x+c.w*.44,c.y+c.h*.22,c.w*.17,c.h*.24,0,0,6.28);
    ctx.ellipse(x-c.w*.40,c.y+c.h*.22,c.w*.19,c.h*.27,0,0,6.28);
    ctx.fill();ctx.restore();
  }
}

function drawBirds(){
  for(var i=0;i<birds.length;i++){
    var b=birds[i];
    var x=((b.x-scrollX*.28-tick*b.sp*.5)%(W*3)+W*5)%(W*3)-50;
    if(x<0||x>W)continue;
    b.wn+=.08;
    var wy=Math.sin(b.wn)*b.sz*.7;
    ctx.strokeStyle='rgba(0,0,0,.45)';ctx.lineWidth=1.5;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(x,b.y);ctx.quadraticCurveTo(x-b.sz,b.y+wy,x-b.sz*2,b.y+wy*.3);ctx.stroke();
    ctx.beginPath();ctx.moveTo(x,b.y);ctx.quadraticCurveTo(x+b.sz,b.y+wy,x+b.sz*2,b.y+wy*.3);ctx.stroke();
  }
}

function drawPerson(ox,gY,fr,sc,flip){
  var ls=Math.sin(fr)*14,as=Math.cos(fr)*9;
  ctx.save();ctx.translate(ox,gY);ctx.scale(flip*sc,sc);
  ctx.fillStyle='rgba(0,0,0,.2)';ctx.beginPath();ctx.ellipse(0,2,13,4,0,0,6.28);ctx.fill();
  ctx.strokeStyle='#1e293b';ctx.lineWidth=6;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(0,-12);ctx.lineTo(-7+ls,-44);ctx.stroke();
  ctx.beginPath();ctx.moveTo(0,-12);ctx.lineTo(7-ls,-44);ctx.stroke();
  ctx.strokeStyle='#111';ctx.lineWidth=4;
  ctx.beginPath();ctx.moveTo(-7+ls,-44);ctx.lineTo(2+ls,-44);ctx.stroke();
  ctx.beginPath();ctx.moveTo(7-ls,-44);ctx.lineTo(16-ls,-44);ctx.stroke();
  ctx.fillStyle='#3b82f6';ctx.fillRect(-9,-48,18,32);
  ctx.strokeStyle='#3b82f6';ctx.lineWidth=6;
  ctx.beginPath();ctx.moveTo(-9,-45);ctx.lineTo(-9-as,-58);ctx.stroke();
  ctx.beginPath();ctx.moveTo(9,-45);ctx.lineTo(9+as,-58);ctx.stroke();
  ctx.fillStyle='#f5cba7';ctx.beginPath();ctx.arc(0,-59,11,0,6.28);ctx.fill();
  ctx.fillStyle='#3a2000';ctx.beginPath();ctx.arc(0,-65,9,Math.PI,0);ctx.fill();
  ctx.restore();
}

function drawWalkers(){
  var gY=H*.815;
  for(var i=0;i<walkers.length;i++){
    var w=walkers[i];
    var x=((w.x-scrollX*(.58+w.sp*.08))%(W*2.5)+W*4)%(W*2.5);
    if(x<0||x>W)continue;
    drawPerson(x,gY,w.fr,w.sc,w.dir);
    w.fr+=.1;
  }
}

function spawnExhaust(){
  var ex=W*.33,ey=H*.82-20;
  for(var i=0;i<2;i++){
    particles.push({x:ex-14,y:ey+5,vx:-1.4-Math.random()*.9,vy:-Math.random()*.4-.1,life:1,r:4+Math.random()*5});
  }
}

function drawParticles(){
  var alive=[];
  for(var i=0;i<particles.length;i++){
    var p=particles[i];
    if(p.life<=0)continue;
    ctx.save();ctx.globalAlpha=p.life*.38;
    ctx.fillStyle='#d1d5db';ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,6.28);ctx.fill();ctx.restore();
    p.x+=p.vx;p.y+=p.vy;p.r+=.12;p.life-=.024;
    alive.push(p);
  }
  particles=alive;
}

function drawWheel(x,y,r){
  ctx.fillStyle='#1c1c1c';ctx.beginPath();ctx.arc(x,y,r,0,6.28);ctx.fill();
  ctx.fillStyle='#d1d5db';ctx.beginPath();ctx.arc(x,y,r*.62,0,6.28);ctx.fill();
  ctx.fillStyle='#9ca3af';ctx.beginPath();ctx.arc(x,y,r*.2,0,6.28);ctx.fill();
  ctx.strokeStyle='#9ca3af';ctx.lineWidth=1.5;
  for(var i=0;i<5;i++){
    var a=wheelA+i/5*6.28;
    ctx.beginPath();ctx.moveTo(x+Math.cos(a)*r*.18,y+Math.sin(a)*r*.18);ctx.lineTo(x+Math.cos(a)*r*.58,y+Math.sin(a)*r*.58);ctx.stroke();
  }
}

var panelEl=document.createElement('div');
panelEl.className='panel';panelEl.id='panel';
document.getElementById('hud').appendChild(panelEl);

var dotsEl=document.getElementById('dots');
for(var di=0;di<SECTIONS.length;di++){
  (function(idx){
    var d=document.createElement('button');
    d.className='ndot'+(idx===0?' on':'');
    d.onclick=function(){goTo(idx);};
    dotsEl.appendChild(d);
  })(di);
}

function updatePanel(){
  var s=SECTIONS[cur];
  panelEl.innerHTML=PANELS[s.id]||'';
  panelEl.classList.remove('on');
  void panelEl.offsetWidth;
  setTimeout(function(){
    panelEl.classList.add('on');
    panelEl.querySelectorAll('.pnum[data-t]').forEach(function(el){
      var tgt=parseInt(el.getAttribute('data-t')),suf=el.getAttribute('data-s')||'',dur=1300,start=performance.now();
      (function step(now){
        var p=Math.min((now-start)/dur,1),e=1-Math.pow(1-p,3);
        el.textContent=~~(e*tgt)+suf;
        if(p<1)requestAnimationFrame(step);
      })(start);
    });
    setTimeout(function(){
      panelEl.querySelectorAll('.sfill[data-w]').forEach(function(b){b.style.width=b.getAttribute('data-w')+'%';});
    },120);
  },80);
  document.querySelectorAll('.ndot').forEach(function(d,i){d.classList.toggle('on',i===cur);});
  document.getElementById('slbl').textContent=LBLS[cur];
}

function goTo(idx){
  if(inTrans||idx===cur)return;
  from=cur;to=idx;cur=idx;tT=0;inTrans=true;
  panelEl.classList.remove('on');
}

document.getElementById('next').onclick=function(){goTo(Math.min(cur+1,SECTIONS.length-1));};
document.getElementById('prev').onclick=function(){goTo(Math.max(cur-1,0));};
document.addEventListener('keydown',function(e){
  if(e.key==='ArrowRight'||e.key==='ArrowDown')goTo(Math.min(cur+1,SECTIONS.length-1));
  if(e.key==='ArrowLeft'||e.key==='ArrowUp')goTo(Math.max(cur-1,0));
});

function frame(){
  requestAnimationFrame(frame);
  tick+=.016;bobPh+=.048;wheelA+=.1;scrollX+=SPEED;
  if(inTrans){tT=Math.min(tT+.017,1);if(tT>=1){inTrans=false;tT=1;from=to;updatePanel();}}
  var e=getEnv();
  ctx.clearRect(0,0,W,H);
  drawSky(e);drawStars(e);drawSun(e);drawClouds();drawMountains(e);
  drawBuildings(e);drawBirds();drawTrees(e);drawGrass();
  drawGround(e);drawDashes();drawWalkers();
  if(tick%0.09<0.016)spawnExhaust();
  drawParticles();drawScooter();
}

updatePanel();frame();
</script>
